name: BHP New Export

on:
  schedule:
    - cron: '0 1 * * *'   # 08:00 ไทย (UTC+7)
    - cron: '0 5 * * *'   # 12:00 ไทย (UTC+7)
  workflow_dispatch:

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install selenium webdriver-manager gspread google-auth openpyxl

      - name: Install Chrome
        run: sudo apt-get install -y google-chrome-stable

      - name: Run bot
        env:
          CSI_USERNAME: ${{ secrets.CSI_USERNAME }}
          CSI_PASSWORD: ${{ secrets.CSI_PASSWORD }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: python bhp_new_bot.py

      - name: Upload screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshot
          path: /tmp/screenshot.png
