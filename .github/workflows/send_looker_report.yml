name: Send Looker Studio Report

on:
  schedule:
    # รันทุกวันเวลา 16:00 น. (เวลาไทย) หรือ 09:00 UTC
    - cron: '0 9 * * *'
  workflow_dispatch: # เพิ่มปุ่มให้กดรันเองได้

jobs:
  automation:
    runs-on: ubuntu-latest
    permissions:
      contents: write # ให้สิทธิ์เขียนไฟล์ลง Repo เพื่ออัปเดตรูป

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright requests
          playwright install chromium --with-deps

      - name: Run Script
        env:
          LOOKER_STUDIO_URL: ${{ secrets.LOOKER_STUDIO_URL }}
          GOOGLE_EMAIL: ${{ secrets.GOOGLE_EMAIL }}
          GOOGLE_PASSWORD: ${{ secrets.GOOGLE_PASSWORD }}
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_GROUP_ID: ${{ secrets.LINE_GROUP_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # มั่นใจว่าชื่อไฟล์ตรงกับที่คุณแก้ (send_report.py)
        run: python send_report.py
