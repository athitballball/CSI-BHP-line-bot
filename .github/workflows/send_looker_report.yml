name: Send Looker Studio Report

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  automation:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          # ลบ cache: 'pip' ออกเพื่อไม่ให้มันฟ้องว่าหาไฟล์ requirements ไม่เจอ

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright requests
          playwright install chromium --with-deps

      - name: Run Script
        env:
          LOOKER_STUDIO_URL: ${{ secrets.LOOKER_STUDIO_URL }}
          GOOGLE_EMAIL: ${{ secrets.GOOGLE_EMAIL }}
          GOOGLE_PASSWORD: ${{ secrets.GOOGLE_PASSWORD }}
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_GROUP_ID: ${{ secrets.LINE_GROUP_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # ใช้คำสั่ง ls เพื่อเช็กไฟล์ก่อนรัน (ช่วย Debug) และรันไฟล์ที่ชื่อถูกต้อง
        run: |
          ls -R
          python send_report.py
