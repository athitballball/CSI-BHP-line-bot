name: Send Looker Studio Report

on:
  schedule:
    # รันทุกวันเวลา 16:00 น. ของไทย (09:00 UTC)
    - cron: '0 9 * * *'
  workflow_dispatch: # ปุ่มกดรันเอง

jobs:
  automation:
    runs-on: ubuntu-latest
    permissions:
      contents: write # สำคัญ: เพื่อให้บอทอัปโหลดรูปกลับเข้าไปใน Repo ได้

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright requests
          playwright install chromium --with-deps

      - name: Execute Script
        env:
          LOOKER_STUDIO_URL: ${{ secrets.LOOKER_STUDIO_URL }}
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_GROUP_ID: ${{ secrets.LINE_GROUP_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}   # ✅ เพิ่ม: ดึงจาก GitHub context อัตโนมัติ
          GITHUB_BRANCH: ${{ github.ref_name }}         # ✅ เพิ่ม: ดึง branch ปัจจุบันอัตโนมัติ
        run: |
          python capture_and_send_line.py               # ✅ แก้: ชื่อไฟล์ให้ตรงกัน (ลบ "ตรวจสอบไฟ" ออก)
