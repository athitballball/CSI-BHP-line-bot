name: Send Looker Studio Report

on:
  schedule:
    # รันทุกวันเวลา 16:00 น. ของไทย (UTC 09:00)
    - cron: '0 9 * * *'
  workflow_dispatch: # กดปุ่มรันเองได้

jobs:
  run-automation:
    runs-on: ubuntu-latest
    permissions:
      contents: write # สำคัญ: เพื่อให้สคริปต์อัปโหลดรูปกลับเข้า Repo ได้

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright requests
          playwright install chromium --with-deps

      - name: Execute Script
        env:
          LOOKER_STUDIO_URL: ${{ secrets.LOOKER_STUDIO_URL }}
          GOOGLE_EMAIL: ${{ secrets.GOOGLE_EMAIL }}
          GOOGLE_PASSWORD: ${{ secrets.GOOGLE_PASSWORD }}
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_GROUP_ID: ${{ secrets.LINE_GROUP_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python send_report.py
